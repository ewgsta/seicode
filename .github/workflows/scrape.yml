name: Daily Scraper

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  scrape-and-dump:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dump/ README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update anime dumps [skip ci]" && git push)

      - name: Send Notification
        if: success()
        env:
          NTFY_URL: ${{ secrets.NTFY_URL }}
        run: |
          TOTAL_ANIME=$(grep "Toplam Anime:" README.md | awk -F': ' '{print $2}')
          TOTAL_EPISODES=$(grep "Toplam Bölüm:" README.md | awk -F': ' '{print $2}')
          TOTAL_STREAMS=$(grep "Toplam Stream (Video Linki):" README.md | awk -F': ' '{print $2}')
          
          curl -d "Seicode için, $TOTAL_ANIME anime, $TOTAL_EPISODES bölüm ve $TOTAL_STREAMS stream eklendi." "$NTFY_URL"
